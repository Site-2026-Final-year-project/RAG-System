services:
  - type: web
    name: rag-system-api
    env: python
    plan: starter
    autoDeploy: true
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: RAG_KB_BACKEND
        value: pgvector
      - key: PYTHON_VERSION
        value: 3.13.0
